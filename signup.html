<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon SignUp Page</title>
    <link rel="stylesheet" href="signin.css">
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <a href="/"><img class="logo" src="Images/amazon_logo_dark.png" width="100px" alt=""></a>

    <div class="signin-container">
        <h1 class="signin-title">Sign Up</h1>
        <h5 class="input-lable">Your name :</h5>
        <input type="text" placeholder="Enter First and Last Name"><br>
        <h5 class="input-lable">Email or Mobile number</h5>
        <input type="email"><br>
        <h5 class="input-lable">Password</h5>
         <input type="password" placeholder="At Least 8 Character"><br>
        <button>Continue</button>
        <p class="signin-text">By continuing, you agree to Amazon's <span>Conditions of Use</span> and <span>Privacy
                Notice</span>.</p>
        <p class="create1">Need help?</p>
        <hr>
        <h2>Buying for work?</h2>
        <p class="create">Create a free business account</p>
    </div>

    <div class="signin-bottom">
        <hr>
        <p>Have an Account</p>
        <hr>
    </div>
    <a href="signin.html"><button class="signin-signup-button">Login with Amazon Account</button></a>

    <footer>
        <div class="footer-links">
            <a href="">Condition of Use</a>
            <a href="">Privacy Notice</a>
            <a href="">help</a>
        </div>
        <p class="footer-text">© 1996-2026, Amazon.com, Inc. or its affiliates</p>
    </footer>





</body>
</html>
